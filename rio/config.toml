# https://rioterm.com/docs/config
confirm-before-quit = false
theme = "catppuccin"

[editor]
program = "vim"
args = []

[effects]
trail-cursor = true

[fonts]
size = 13
family = "TX-02"
features = ["zero","calt","liga"]
extras = [{family="JetBrainsMono Nerd Font Mono"}]
symbol-map = [
  # powerline & powerline-extras
  {start = "e0b0", end ="e0b3", font-family="JetBrainsMono Nerd Font Mono"},
  {start = "e0b4", end ="e0c8", font-family="JetBrainsMono Nerd Font Mono"},
  {start = "e0cc", end ="e0d4", font-family="JetBrainsMono Nerd Font Mono"},
  {start = "e0ca", end ="e0ca", font-family="JetBrainsMono Nerd Font Mono"},
  # font-awesome
  {start = "f000", end ="f2e0", font-family="JetBrainsMono Nerd Font Mono"},
  {start = "f200", end ="e2a9", font-family="JetBrainsMono Nerd Font Mono"},
  # seti-ui
  {start = "e5fa", end ="e6b1", font-family="JetBrainsMono Nerd Font Mono"},
  # codicons
  {start = "ea60", end ="ebeb", font-family="JetBrainsMono Nerd Font Mono"},
]

[window]
mode = "Maximized"
decorations = "Enabled"
macos-use-shadow = true
colorspace = "rec2020"
macos-use-unified-titlebar = true

[bindings]
keys = [
  # navigate between splits (vim-style)
  # super+h requires remapping "Hide rio" in macOS keyboard settings
  {key="h" , with="super", action="SelectPrevSplit"},
  {key="j" , with="super", action="SelectPrevSplit"},
  {key="k" , with="super", action="SelectNextSplit"},
  {key="l" , with="super", action="SelectNextSplit"},

  # resize splits
  {key="right" , with="super", action="MoveDividerLeft"},
  {key="down" , with="super", action="MoveDividerUp"},
  {key="up" , with="super", action="MoveDividerDown"},
  {key="left" , with="super", action="MoveDividerRight"},
]
